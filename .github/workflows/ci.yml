name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXTAUTH_SECRET: ci-test-secret-for-github-actions-only
  DATABASE_URL: postgresql://letters:letters_dev@localhost:5435/letters_to_god
  TWO_FACTOR_SECRET_ENCRYPTION_KEY: ci-test-2fa-encryption-key-actions-only
  APP_BASE_URL: http://localhost:3001
  NEXTAUTH_URL: http://localhost:3001
  AUTH_RATE_LIMIT_STORE: postgres
  RATE_LIMIT_STORE: postgres

jobs:
  branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require feature/fix/docs/chore prefix
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ ! "$BRANCH" =~ ^(feature|fix|docs|chore)/ ]]; then
            echo "::error::Branch '$BRANCH' must start with feature/, fix/, docs/, or chore/"
            exit 1
          fi
          echo "Branch name OK: $BRANCH"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('eslint.config.mjs', 'package-lock.json') }}
          restore-keys: eslint-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/cache@v4
        with:
          path: .cache/tsconfig.tsbuildinfo
          key: tsc-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'tsconfig.ci.json', 'package-lock.json') }}
          restore-keys: tsc-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test with coverage
        run: npm run test:coverage
        env:
          NODE_OPTIONS: --max-old-space-size=8192

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
