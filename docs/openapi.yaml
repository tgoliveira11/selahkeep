openapi: 3.0.3
info:
  title: SelahKeep — Private Encrypted Notes API
  version: 0.1.0
  description: |
    REST API for the SelahKeep private encrypted notes MVP.

    **Security:** Private letter title and body must never be sent in plaintext.
    All letter fields use structured encrypted payloads (see ADR-001 / ADR-003).

    **Auth:** Most routes require a NextAuth session cookie (sign in via the web app first).
    Use browser Swagger "Try it out" while logged in, or import the spec into Postman/Insomnia
    with your session cookie.

    **Spec file:** `docs/openapi.yaml` — served as JSON at `GET /api/openapi`.
servers:
  - url: http://localhost:3001
    description: Local development (default port)
tags:
  - name: Auth
  - name: Notes
  - name: Vault
  - name: Passkeys
  - name: Recovery
  - name: Account
  - name: Admin
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: |
        NextAuth JWT session cookie. Name may be `__Secure-next-auth.session-token` in production HTTPS.
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
    EncryptedPayload:
      type: object
      required: [version, alg, iv, ciphertext, aad]
      properties:
        version:
          type: string
          enum: [enc-v1]
        alg:
          type: string
          enum: [AES-GCM]
        iv:
          type: string
          description: Base64url-encoded IV
        ciphertext:
          type: string
          description: Base64url-encoded ciphertext
        aad:
          type: object
          required: [userId, resourceId, field]
          properties:
            userId:
              type: string
              format: uuid
            resourceId:
              type: string
              format: uuid
            field:
              type: string
              enum: [title, body, letter_key, vault_key]
    KdfMetadata:
      oneOf:
        - type: object
          required: [kdf, version, salt, memory, iterations, parallelism]
          properties:
            kdf:
              type: string
              enum: [argon2id]
            version:
              type: string
              enum: [kdf-v1]
            salt:
              type: string
            memory:
              type: integer
            iterations:
              type: integer
            parallelism:
              type: integer
        - type: object
          required: [kdf, version, salt, iterations]
          properties:
            kdf:
              type: string
              enum: [pbkdf2-sha256]
            version:
              type: string
              enum: [kdf-v1]
            salt:
              type: string
            iterations:
              type: integer
    Note:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vaultId:
          type: string
          format: uuid
        encryptedMetadata:
          $ref: '#/components/schemas/EncryptedPayload'
        encryptedBody:
          $ref: '#/components/schemas/EncryptedPayload'
        encryptedWrappedNoteKey:
          $ref: '#/components/schemas/EncryptedPayload'
        bodyEncryptionVersion:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
    CreateNoteRequest:
      type: object
      required: [id, encryptedMetadata, encryptedBody, encryptedWrappedNoteKey, bodyEncryptionVersion]
      properties:
        id:
          type: string
          format: uuid
          description: Client-generated note UUID (used in AAD resourceId)
        encryptedMetadata:
          $ref: '#/components/schemas/EncryptedPayload'
        encryptedBody:
          $ref: '#/components/schemas/EncryptedPayload'
        encryptedWrappedNoteKey:
          $ref: '#/components/schemas/EncryptedPayload'
        bodyEncryptionVersion:
          type: string
          enum: [enc-v1]
    UpdateNoteRequest:
      type: object
      properties:
        encryptedMetadata:
          $ref: '#/components/schemas/EncryptedPayload'
        encryptedBody:
          $ref: '#/components/schemas/EncryptedPayload'
        encryptedWrappedNoteKey:
          $ref: '#/components/schemas/EncryptedPayload'
        bodyEncryptionVersion:
          type: string
    TwoFactorStatus:
      type: object
      properties:
        enabled:
          type: boolean
        enabledAt:
          type: string
          format: date-time
          nullable: true
        hasPendingSetup:
          type: boolean
    TwoFactorSetupStartResponse:
      type: object
      properties:
        qrCodeDataUrl:
          type: string
        manualSetupKey:
          type: string
          description: Shown only during setup; not returned after enable
        issuer:
          type: string
        accountLabel:
          type: string
    TwoFactorVerifyRequest:
      type: object
      properties:
        code:
          type: string
          pattern: '^\\d{6}$'
        backupCode:
          type: string
          minLength: 8
          maxLength: 32
paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: User created
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered
        '429':
          description: Rate limited
  /api/auth/verify-email/resend:
    post:
      tags: [Auth]
      summary: Resend email verification link
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Generic success (no enumeration)
        '429':
          description: Rate limited
  /api/auth/verify-email/confirm:
    post:
      tags: [Auth]
      summary: Confirm email verification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  minLength: 16
      responses:
        '200':
          description: Email verified
        '400':
          description: Invalid or expired token
        '429':
          description: Rate limited
  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email (generic response)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Generic message regardless of account existence
        '429':
          description: Rate limited
  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Validate or consume password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, token]
              properties:
                action:
                  type: string
                  enum: [validate, reset]
                token:
                  type: string
                  minLength: 16
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Token valid or password reset
        '400':
          description: Invalid token or policy rejection
        '429':
          description: Rate limited
  /api/account/change-password:
    post:
      tags: [Account]
      summary: Change password for signed-in credentials account
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password updated
        '400':
          description: Validation or policy error
        '401':
          description: Wrong current password
        '429':
          description: Rate limited
  /api/account/auth-status:
    get:
      tags: [Account]
      summary: Email verification and password capability flags
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Auth status for account settings UI
  /api/account/sessions:
    get:
      tags: [Account]
      summary: List active account sessions (no raw tokens)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Active sessions for current user
        '401':
          description: Unauthorized
  /api/account/sessions/ping:
    post:
      tags: [Account]
      summary: Update current session metadata from request headers
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Metadata updated
  /api/account/sessions/revoke-current:
    post:
      tags: [Account]
      summary: Revoke the current account session (sign out)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Current session revoked if present
  /api/account/sessions/revoke-others:
    post:
      tags: [Account]
      summary: Revoke all sessions except the current one
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Other sessions revoked
  /api/account/sessions/revoke-all:
    post:
      tags: [Account]
      summary: Revoke all sessions including current (sign out everywhere)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: All sessions revoked
  /api/account/sessions/{id}:
    delete:
      tags: [Account]
      summary: Revoke a specific account session
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session revoked
        '404':
          description: Session not found
  /api/auth/login/start:
    post:
      tags: [Auth]
      summary: Start credentials login (password verification; optional 2FA challenge)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Login token or 2FA challenge
        '401':
          description: Invalid credentials
        '429':
          description: Rate limited
  /api/auth/login/verify-2fa:
    post:
      tags: [Auth]
      summary: Complete credentials login after TOTP or backup code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challengeToken]
              allOf:
                - $ref: '#/components/schemas/TwoFactorVerifyRequest'
                - type: object
                  properties:
                    challengeToken:
                      type: string
                      minLength: 16
      responses:
        '200':
          description: One-time login token for NextAuth
        '401':
          description: Invalid challenge or code
        '429':
          description: Rate limited
  /api/auth/login/verify-2fa-oauth:
    post:
      tags: [Auth]
      summary: Complete OAuth login (Google, Apple, Microsoft) when account 2FA is enabled
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorVerifyRequest'
      responses:
        '200':
          description: Session upgrade token
        '401':
          description: Invalid code
        '429':
          description: Rate limited
  /api/notes:
    get:
      tags: [Notes]
      summary: List encrypted notes for the authenticated user's vault
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Encrypted note list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Note'
        '401':
          description: Unauthorized
    post:
      tags: [Notes]
      summary: Create an encrypted note
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Note created
        '400':
          description: Plaintext rejected or invalid payload
        '401':
          description: Unauthorized
  /api/notes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Notes]
      summary: Get one encrypted note
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Encrypted note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          description: Not found
    put:
      tags: [Notes]
      summary: Update encrypted note payloads
      security:
        - sessionCookie: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Updated note
        '400':
          description: Plaintext rejected or invalid payload
        '404':
          description: Not found
    delete:
      tags: [Notes]
      summary: Soft-delete a note
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found
  /api/notes/{id}/versions:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Notes]
      summary: List encrypted version snapshots for a note (newest first)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Encrypted note versions
        '404':
          description: Note not found
    post:
      tags: [Notes]
      summary: Append an encrypted version snapshot (client-encrypted, AAD-bound to versionId)
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Version created
        '400':
          description: Plaintext rejected or invalid payload
        '404':
          description: Note not found
  /api/notes/{id}/versions/{versionId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: versionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Notes]
      summary: Get one encrypted note version
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Encrypted note version
        '404':
          description: Not found
  /api/vault/index:
    get:
      tags: [Vault]
      summary: Get encrypted vault index
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Encrypted vault index blob
    patch:
      tags: [Vault]
      summary: Update encrypted vault index
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Updated encrypted vault index
        '400':
          description: Plaintext rejected
  /api/vault/settings:
    get:
      tags: [Vault]
      summary: Get encrypted vault settings
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Encrypted vault settings blob
    patch:
      tags: [Vault]
      summary: Update encrypted vault settings (unlock behavior, etc.)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Updated encrypted vault settings
        '400':
          description: Plaintext rejected
  /api/vault/init:
    post:
      tags: [Vault]
      summary: Initialize user vault with encrypted envelopes
      security:
        - sessionCookie: []
      responses:
        '201':
          description: Vault initialized
        '409':
          description: Vault already exists
  /api/vault/status:
    get:
      tags: [Vault]
      summary: Vault and recovery status
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Vault status
  /api/vault/unlock-with-recovery-code:
    post:
      tags: [Vault, Recovery]
      summary: Fetch recovery envelope (client decrypts locally)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Encrypted vault key + KDF metadata
        '429':
          description: Rate limited
  /api/recovery-code:
    post:
      tags: [Recovery]
      summary: Store or regenerate recovery-code envelope (legacy vault-v1)
      security:
        - sessionCookie: []
      responses:
        '201':
          description: Recovery envelope stored
  /api/vault/recovery-phrase:
    post:
      tags: [Recovery, Vault]
      summary: Replace recovery-phrase envelope (client encrypts UVK; atomic revoke + create)
      security:
        - sessionCookie: []
      responses:
        '201':
          description: New recovery phrase envelope stored
        '400':
          description: Plaintext rejected or invalid payload
        '404':
          description: Vault or recovery phrase not configured
  /api/passkeys/register:
    post:
      tags: [Passkeys]
      summary: Passkey registration (options or verify)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: WebAuthn options or verification result
  /api/passkeys/authenticate:
    post:
      tags: [Passkeys]
      summary: Explicit signed-in passkey vault unlock (options or verify)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: WebAuthn options or verification result
  /api/passkeys:
    delete:
      tags: [Passkeys]
      summary: Remove all passkeys and passkey vault envelope
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Removed
  /api/auth/passkey/login/options:
    post:
      tags: [Auth]
      summary: Passkey sign-in WebAuthn options (unauthenticated)
      responses:
        '200':
          description: WebAuthn authentication options
  /api/auth/passkey/login/verify:
    post:
      tags: [Auth]
      summary: Verify passkey sign-in and issue login token
      responses:
        '200':
          description: Account login token; no vault unlock metadata
  /api/account/passkeys:
    get:
      tags: [Account]
      summary: List account passkeys
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Registered passkeys with capability labels
  /api/account/passkeys/register:
    post:
      tags: [Account]
      summary: Register passkey for account sign-in (options or verify)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: WebAuthn options or verification result
  /api/account/passkeys/{id}:
    delete:
      tags: [Account]
      summary: Remove a passkey
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Removed
  /api/account/passkeys/{id}/enable-vault-unlock:
    post:
      tags: [Account]
      summary: Upgrade sign-in passkey to vault unlock (options or verify)
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: WebAuthn options or success
  /api/account/2fa/status:
    get:
      tags: [Account]
      summary: Two-factor authentication status
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Current 2FA state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorStatus'
  /api/account/2fa/setup/start:
    post:
      tags: [Account]
      summary: Start TOTP setup (pending until verified)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: QR code and manual setup key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorSetupStartResponse'
        '409':
          description: Already enabled
        '429':
          description: Rate limited
  /api/account/2fa/setup/verify:
    post:
      tags: [Account]
      summary: Verify TOTP code and enable 2FA
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: '^\\d{6}$'
      responses:
        '200':
          description: Enabled; backup codes returned once
        '400':
          description: Invalid code
        '429':
          description: Rate limited
  /api/account/2fa/disable:
    post:
      tags: [Account]
      summary: Disable 2FA (requires current TOTP or backup code)
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorVerifyRequest'
      responses:
        '200':
          description: Disabled
        '400':
          description: Invalid code
        '429':
          description: Rate limited
  /api/account/2fa/backup-codes/regenerate:
    post:
      tags: [Account]
      summary: Regenerate backup codes (requires TOTP or backup code)
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorVerifyRequest'
      responses:
        '200':
          description: New backup codes returned once
        '400':
          description: Invalid code
        '429':
          description: Rate limited
  /api/account:
    delete:
      tags: [Account]
      summary: Delete account and all encrypted user data
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Account deleted
        '429':
          description: Rate limited
  /api/admin/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Admin]
      summary: Admin user summary (no letter content)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: User summary with counts only
