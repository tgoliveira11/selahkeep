services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: letters
      POSTGRES_PASSWORD: letters_dev
      POSTGRES_DB: letters_to_god
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letters -d letters_to_god"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
