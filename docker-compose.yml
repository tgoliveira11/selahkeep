services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: letters
      POSTGRES_PASSWORD: letters_dev
      POSTGRES_DB: letters_to_god
    # Host 5435 avoids clashing with other local Postgres containers on 5432/5433/5434.
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letters -d letters_to_god"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
